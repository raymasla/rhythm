<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ray's Rhythm Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <div id="step-device" class="scene">
            <h2 class="title">請選擇遊玩設備</h2>
            <div class="box-container">
                <button class="menu-box" onclick="selectDevice('PC')">電腦 (PC)</button>
                <button class="menu-box" onclick="selectDevice('Mobile')">手機 (Mobile)</button>
            </div>
        </div>

        <div id="step-audio" class="scene hidden">
            <h2 class="title">您是否配戴耳機？</h2>
            <div class="box-container">
                <button class="menu-box" onclick="selectAudio(true)">有戴耳機</button>
                <button class="menu-box" onclick="selectAudio(false)">沒有戴耳機</button>
            </div>
        </div>

        <div id="step-latency" class="scene hidden">
            <h2 class="title">校正音訊延遲</h2>
            <p class="subtitle">調整旋鈕，讓「白球觸地」與「嗶聲」同步</p>
            <div id="animation-area">
                <div id="bouncing-ball"></div>
                <div id="ground-line"></div>
            </div>
            <div class="control-panel">
                <input type="range" id="latency-slider" min="0" max="500" value="0" step="1">
                <span id="latency-value">0 ms</span>
            </div>
            <div class="box-container btn-group">
                <button class="menu-box btn-small" onclick="goBackToAudio()">返回</button>
                <button class="menu-box btn-small" onclick="confirmLatency()">確認</button>
            </div>
        </div>

        <div id="step-song-select" class="scene hidden">
            <h2 class="title">選擇歌曲</h2>
            <div id="carousel-container"></div>
            <p class="hint-text">🔼 🔽 使用方向鍵 或 螢幕上下輕滑<br>按下 Enter 或 點擊歌曲確認</p>
        </div>

        <div id="difficulty-modal" class="hidden">
            <div class="modal-content">
                <h2 id="selected-song-title">歌曲名稱</h2>
                <div class="diff-btn" onclick="prepareGame('extreme-easy')">極度簡單 (4軌)<br><small>任意鍵同發</small></div>
                <div class="diff-btn" onclick="prepareGame('easy')">簡單 (4軌)<br><small>左 F / 右 J</small></div>
                <div class="diff-btn" onclick="prepareGame('normal')">普通 (4軌)<br><small>D, F, J, K</small></div>
                <div class="diff-btn" style="border-color: #ff00ff;" onclick="prepareGame('hard')">極度困難 (6軌)<br><small>加入滑動 (S, D/E, F, J, K/I, L)</small></div>
                <div class="close-btn" onclick="closeModal()">返回選單</div>
            </div>
        </div>

        <div id="pre-game-modal" class="scene hidden" style="z-index: 200; background: rgba(0,0,0,0.9);">
            <div class="modal-content" style="max-width: 450px;">
                <h2 class="title" style="color: #00f0ff;">操作說明</h2>
                <p id="pre-game-rules" style="font-size: 1.1rem; line-height: 1.8; text-align: left;"></p>
                
                <div style="margin-top: 25px; text-align: left; background: #141414; padding: 15px; border-radius: 6px; border: 1px solid #333;">
                    <label style="color: #00f0ff; font-weight: bold; display: block; margin-bottom: 8px;">音符掉落速度 (秒)</label>
                    <p style="font-size: 0.8rem; color: #888; margin-top: 0;">數值越小，掉落越快 (預設 2.0)</p>
                    <input type="number" id="speed-input" value="2.0" step="0.1" min="0.5" max="5.0" style="width: 100%; padding: 10px; font-size: 1.2rem; background: #000; color: #fff; border: 1px solid #00f0ff; border-radius: 4px; text-align: center;">
                </div>

                <div id="start-game-btn" class="menu-box btn-small" style="margin: 25px auto 0; width: 100%;" onclick="startGame()">點擊開始 (或按 Enter)</div>
            </div>
        </div>

        <div id="step-game" class="scene hidden">
            <div id="combo-display">
                <div id="judgement-text"></div>
                <div id="combo-text"></div>
            </div>
            <div id="game-stage">
                <div id="lanes-container"></div>
            </div>
        </div>

        <div id="step-result" class="scene hidden">
            <div class="modal-content result-panel">
                <h2 class="title">歌曲結算</h2>
                <div class="score-row"><span class="rank-s">S+</span> <span id="res-s">0</span></div>
                <div class="score-row"><span class="rank-a">A</span> <span id="res-a">0</span></div>
                <div class="score-row"><span class="rank-c">C</span> <span id="res-c">0</span></div>
                <div class="score-row combo-row">MAX COMBO <span id="res-max">0</span></div>
                <div id="res-mode-label" style="opacity: 0.5; font-size: 0.9rem; margin-top: 20px; color: #888; text-transform: uppercase;"></div>
                <button class="menu-box btn-small" style="margin-top:20px; width: 100%;" onclick="backToMenu()">回主選單</button>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>
</html>
